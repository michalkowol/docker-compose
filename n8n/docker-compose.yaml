services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:2.17.7
    restart: unless-stopped
    environment:
      - N8N_HOST=n8n.app.codeloop.eu
      - N8N_PORT=3000
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.app.codeloop.eu/
      - GENERIC_TIMEZONE=Europe/Warsaw
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
volumes:
  n8n_data:
